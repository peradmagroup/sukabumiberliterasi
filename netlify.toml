[build]
  command = "npm run build -w packages/backend && npm run build -w packages/literasi-app"
  publish = "packages/literasi-app/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
